<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c12"/>
      <stop offset="100%" stop-color="#131320"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="44" height="44" rx="11" fill="url(#bg)"/>
  <rect width="44" height="44" rx="11" fill="url(#g1)" opacity="0.12"/>
  <!-- Neural net: 5 nodes -->
  <circle cx="22" cy="11" r="3.2" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="12" cy="22" r="2.6" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="32" cy="22" r="2.6" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="16" cy="33" r="2.2" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="28" cy="33" r="2.2" fill="#06b6d4" filter="url(#glow)"/>
  <!-- Connecting lines -->
  <line x1="22" y1="11" x2="12" y2="22" stroke="url(#g1)" stroke-width="1.1" opacity="0.65"/>
  <line x1="22" y1="11" x2="32" y2="22" stroke="url(#g1)" stroke-width="1.1" opacity="0.65"/>
  <line x1="12" y1="22" x2="16" y2="33" stroke="#6366f1" stroke-width="1" opacity="0.55"/>
  <line x1="32" y1="22" x2="28" y2="33" stroke="#6366f1" stroke-width="1" opacity="0.55"/>
  <line x1="12" y1="22" x2="28" y2="33" stroke="#7c3aed" stroke-width="0.6" opacity="0.28"/>
  <line x1="32" y1="22" x2="16" y2="33" stroke="#7c3aed" stroke-width="0.6" opacity="0.28"/>
  <line x1="16" y1="33" x2="28" y2="33" stroke="#06b6d4" stroke-width="1" opacity="0.55"/>
  <!-- Gold accent dot -->
  <circle cx="34" cy="9" r="3.5" fill="#f5a623" opacity="0.9" filter="url(#glow)"/>
</svg>
